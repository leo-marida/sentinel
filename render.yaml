services:
  - type: web
    name: sentinel-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_FAST_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_SMART_MODEL
        value: gpt-4o
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: sentinel
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'
      - key: ENVIRONMENT
        value: production
